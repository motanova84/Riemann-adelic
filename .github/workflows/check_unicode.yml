name: Check for problematic Unicode characters
on: 
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-unicode:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Check for problematic Unicode characters
        run: |
          echo "🔍 Checking for problematic Unicode characters in notebooks..."
          
          # Define problematic characters that can cause Python syntax errors
          PROBLEMATIC_CHARS="≪≫≠≤≥''""–—"
          
          # Check notebooks directory - use grep -q instead of head|read
          if find notebooks/ -name "*.ipynb" -exec grep -q "[$PROBLEMATIC_CHARS]" {} \+ 2>/dev/null; then
            echo "❌ Found problematic Unicode characters in notebook files:"
            find notebooks/ -name "*.ipynb" -exec grep -Hn "[$PROBLEMATIC_CHARS]" {} \;
            echo ""
            echo "💡 Replace these characters with ASCII equivalents:"
            echo "   ≪ → <<"
            echo "   ≫ → >>"
            echo "   ≠ → !="
            echo "   ≤ → <="
            echo "   ≥ → >="
            echo "   – → -"
            echo "   — → -"
            exit 1
          fi
          
          # Check root level notebooks
          if find . -maxdepth 1 -name "*.ipynb" -exec grep -q "[$PROBLEMATIC_CHARS]" {} \+ 2>/dev/null; then
            echo "❌ Found problematic Unicode characters in root notebook files:"
            find . -maxdepth 1 -name "*.ipynb" -exec grep -Hn "[$PROBLEMATIC_CHARS]" {} \;
            exit 1
          fi
          
          echo "✅ No problematic Unicode characters found in notebooks"
          
      - name: Validate notebook JSON structure
        run: |
          echo "🔍 Validating JSON structure of notebooks..."
          python3 -c "
          import json
          import glob
          import sys
          
          notebooks = glob.glob('notebooks/*.ipynb') + glob.glob('*.ipynb')
          errors = 0
          
          for notebook in notebooks:
              try:
                  with open(notebook, 'r', encoding='utf-8') as f:
                      json.load(f)
                  print(f'✅ {notebook}: Valid JSON')
              except json.JSONDecodeError as e:
                  print(f'❌ {notebook}: Invalid JSON - {e}')
                  errors += 1
              except Exception as e:
                  print(f'❌ {notebook}: Error - {e}')
                  errors += 1
          
          if errors > 0:
              print(f'\n❌ {errors} notebook(s) have JSON errors')
              sys.exit(1)
          else:
              print(f'\n✅ All {len(notebooks)} notebooks have valid JSON structure')
          "
