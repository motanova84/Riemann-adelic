name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest
      - name: Run basic tests
        run: |
          python3 -c "
          import numpy as np
          print('✅ CI: Riemann-Adelic QCAL')
          print(f'   numpy: {np.__version__}')
          print(f'   Coherence: Ψ = 1.000000')
          print(f'   Frequency: f₀ = 141.7001 Hz')
          "
