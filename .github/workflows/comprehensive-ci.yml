name: 🧮 Comprehensive Riemann-Adelic CI/CD

on:
  push:
    branches: [main, develop, copilot/**]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_validation:
        description: 'Ejecutar validación completa con parámetros high_accuracy'
        required: false
        default: 'false'
        type: string
      precision_level:
        description: 'Precision level (t1e8, t1e10, t1e12)'
        required: false
        default: 't1e8'
        type: choice
        options:
          - t1e8
          - t1e10
          - t1e12

permissions:
  contents: read
  actions: read

env:
  PRIME_COUNT: ${{ github.event.inputs.run_full_validation == 'true' && '500' || '100' }}
  PRIME_POWERS: 5
  ZERO_COUNT: ${{ github.event.inputs.run_full_validation == 'true' && '500' || '100' }}
  INTEGRATION_T: ${{ github.event.inputs.run_full_validation == 'true' && '50' || '10' }}
  PRECISION_DPS: ${{ github.event.inputs.run_full_validation == 'true' && '40' || '25' }}
  PRECISION_LEVEL: ${{ github.event.inputs.precision_level || 't1e8' }}

jobs:
  setup-and-validate:
    name: 🔧 Setup & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    outputs:
      python-version: ${{ steps.setup-python.outputs.python-version }}
      cache-key: ${{ steps.cache-deps.outputs.cache-hit }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          # Install LLVM tools for numba/llvmlite
          sudo apt-get install -y llvm-14 llvm-14-dev || sudo apt-get install -y llvm-dev
          # Install libigraph (package name varies by Ubuntu version)
          sudo apt-get install -y libigraph-dev || sudo apt-get install -y libigraph0-dev || echo "⚠️ libigraph-dev no disponible, se usará pip"
          
      - name: 💾 Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/requirements-lock.txt') }}-v2
          
      - name: 📦 Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        env:
          NUMEXPR_MAX_THREADS: 4
          NUMEXPR_NUM_THREADS: 2
        run: |
          python -m pip install --upgrade pip
          pip install --user -r requirements-lock.txt || pip install --user -r requirements.txt
          pip install --user flake8 black isort
          
      - name: 🔍 Code quality checks
        run: |
          # Check Python syntax
          python -m py_compile validate_explicit_formula.py utils/*.py tests/*.py
          
          # Optional linting
          echo "🎨 Running code quality checks..."
          flake8 --max-line-length=120 --ignore=E203,W503,E501 *.py utils/ tests/ || echo "⚠️ Style issues found (non-blocking)"
          
      - name: 📋 Validate project structure
        run: |
          echo "🔍 Validating project structure..."
          required_files=("requirements.txt" "validate_explicit_formula.py")
          for file in "${required_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ $file exists"
            else
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
