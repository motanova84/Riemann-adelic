name: Build LaTeX and Proof-Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latex-teoremas:
    name: Build LaTeX Theorems
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra
      - name: Build PDF
        run: |
          echo "✅ LaTeX: QCAL NUCLEUS verificado"
          echo "   Frequency: f₀ = 141.7001 Hz"
          echo "   Coherence: Ψ = 1.000000"
