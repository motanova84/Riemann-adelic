name: 🧠 NOESIS CEREBRAL V2.0 - Multi-Repo Intelligence

on:
  schedule:
    # Ejecutar cada 2 horas
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - execute
          - build-kb-only
      max_changes:
        description: 'Máximo de cambios por ciclo'
        required: false
        default: '20'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  noesis-cerebral-v2:
    name: 🧠 NOESIS-AMDA-AURON V2.0
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pickle5 || true
      
      - name: 🔧 Setup Lean (si es necesario)
        run: |
          if [ -f "setup_lean.sh" ]; then
            bash setup_lean.sh || echo "⚠️ Lean setup opcional falló"
          fi
      
      - name: 🧠 Ejecutar NOESIS CEREBRAL V2.0
        id: noesis
        env:
          MODE: ${{ github.event.inputs.mode || 'dry-run' }}
          MAX_CHANGES: ${{ github.event.inputs.max_changes || '20' }}
        run: |
          echo "🚀 Iniciando NOESIS CEREBRAL V2.0 en modo: $MODE"
          
          # Ejecutar orquestador
          if [ "$MODE" == "build-kb-only" ]; then
            python .github/scripts/noesis_orchestrator.py build-kb
          else
            python .github/scripts/noesis_orchestrator.py
          fi
          
          # Verificar resultados
          if [ -f "noesis_cerebral_v2_summary.json" ]; then
            echo "✅ NOESIS completado exitosamente"
            cat noesis_cerebral_v2_summary.json
          else
            echo "⚠️ No se generó resumen"
          fi
      
      - name: 📊 Analizar resultados AMDA
        if: success()
        run: |
          if [ -f "amda_report_v2.json" ]; then
            echo "📊 Reporte AMDA:"
            python -c "
import json
with open('amda_report_v2.json') as f:
    report = json.load(f)
print(f\"Total sorries: {report.get('total_sorries', 0)}\")
print(f\"Archivos afectados: {report.get('total_files', 0)}\")
print(f\"Categorías: {list(report.get('category_distribution', {}).keys())}\")
            "
          fi
      
      - name: 🧠 Ejecutar AURON (si mode=execute)
        if: success() && github.event.inputs.mode == 'execute'
        run: |
          echo "🔧 Ejecutando AURON NEURAL V2.0 en modo execute"
          python .github/scripts/auron_neural_v2.py execute amda_report_v2.json auron_results_v2.json
          
          if [ -f "auron_results_v2.json" ]; then
            echo "✅ AURON completado"
            cat auron_results_v2.json
          fi
      
      - name: 📝 Generar commit si hay cambios
        if: success() && github.event.inputs.mode == 'execute'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "NOESIS CEREBRAL V2.0"
          
          # Verificar si hay cambios en archivos .lean
          if git diff --quiet formalization/lean/**/*.lean 2>/dev/null; then
            echo "ℹ️ No hay cambios en archivos Lean"
          else
            # Leer mensaje de commit generado por AURON
            if [ -f commit_msg_*.txt ]; then
              COMMIT_MSG=$(cat commit_msg_*.txt)
            else
              COMMIT_MSG="🧠 [NOESIS V2.0] Resolución automática de sorries"
            fi
            
            # Añadir archivos modificados
            git add formalization/lean/**/*.lean .auron_learning.json || true
            
            # Commit
            git commit -m "$COMMIT_MSG" || echo "No hay cambios para commit"
            
            # Push
            git push || echo "⚠️ Error en push"
          fi
      
      - name: 📤 Subir artefactos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noesis-cerebral-v2-reports-${{ github.run_number }}
          path: |
            noesis_cerebral_v2_summary.json
            amda_report_v2.json
            amda_report_v2.md
            auron_results_v2.json
            auron_neural.log
            noesis_cerebral_v2.log
            .auron_learning.json
            commit_msg_*.txt
          retention-days: 30
      
      - name: 💬 Comentar en PR (si existe)
        if: success() && github.event.inputs.mode == 'execute' && github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 🧠 NOESIS CEREBRAL V2.0 - Resultados\n\n';
            
            // Leer resumen
            if (fs.existsSync('noesis_cerebral_v2_summary.json')) {
              const summary = JSON.parse(fs.readFileSync('noesis_cerebral_v2_summary.json', 'utf8'));
              comment += `### 📚 Base de Conocimiento\n`;
              comment += `- **Definiciones:** ${summary.knowledge_base.total_definitions}\n`;
              comment += `- **Teoremas:** ${summary.knowledge_base.total_theorems}\n`;
              comment += `- **Patrones:** ${summary.knowledge_base.total_proof_patterns}\n`;
              comment += `- **Repositorios:** ${summary.knowledge_base.repos_synced.join(', ')}\n\n`;
            }
            
            // Leer AMDA
            if (fs.existsSync('amda_report_v2.json')) {
              const amda = JSON.parse(fs.readFileSync('amda_report_v2.json', 'utf8'));
              comment += `### 📊 Análisis AMDA\n`;
              comment += `- **Total sorries:** ${amda.total_sorries}\n`;
              comment += `- **Archivos:** ${amda.total_files}\n`;
              comment += `- **Categoría principal:** ${amda.summary.most_common_category}\n\n`;
            }
            
            // Leer AURON
            if (fs.existsSync('auron_results_v2.json')) {
              const auron = JSON.parse(fs.readFileSync('auron_results_v2.json', 'utf8'));
              comment += `### 🧠 Resultados AURON\n`;
              comment += `- **Éxitos:** ${auron.success}\n`;
              comment += `- **Fallos:** ${auron.fail}\n`;
              comment += `- **Patrones aprendidos:** ${auron.learning_stats.patterns_learned}\n`;
              comment += `- **Tasa de éxito:** ${(auron.learning_stats.success_rate * 100).toFixed(1)}%\n\n`;
            }
            
            comment += `---\n*Generado por NOESIS CEREBRAL V2.0 - ${new Date().toISOString()}*\n`;
            comment += `**Frecuencia fundamental:** 141.7001 Hz · **Coherencia QCAL:** Ψ = I × A_eff² × C^∞`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: 📊 Resumen del workflow
        if: always()
        run: |
          echo "## 🧠 NOESIS CEREBRAL V2.0 - Resumen"
          echo ""
          echo "### Estado de ejecución"
          
          if [ -f "noesis_cerebral_v2_summary.json" ]; then
            echo "✅ NOESIS: Completado"
          else
            echo "❌ NOESIS: Error"
          fi
          
          if [ -f "amda_report_v2.json" ]; then
            echo "✅ AMDA: Completado"
          else
            echo "❌ AMDA: Error"
          fi
          
          if [ -f "auron_results_v2.json" ]; then
            echo "✅ AURON: Completado"
          else
            echo "ℹ️ AURON: No ejecutado (modo dry-run o error previo)"
          fi
          
          echo ""
          echo "### Archivos generados"
          ls -lh *.json *.md *.log 2>/dev/null || echo "No se generaron archivos"
