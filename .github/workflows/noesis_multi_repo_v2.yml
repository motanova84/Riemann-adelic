name: 🧠 NOESIS COMPLETE INTEGRATION V2.1

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: true
        default: 'full'
        type: choice
        options:
          - sync
          - harvest
          - analyze
          - full
      force_sync:
        description: 'Force re-sync all repositories'
        required: false
        default: false
        type: boolean
      force_fix:
        description: 'Forzar reparación de integración'
        required: false
        default: false
        type: boolean
      max_changes:
        description: 'Maximum changes per cycle'
        required: false
        default: '20'
        type: string
      dry_run:
        description: 'Dry run mode (no actual changes)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cerebral-seal:
    name: NOESIS CEREBRAL V2.0
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy scipy mpmath sympy
          pip install pytest  # Para pruebas
      
      - name: Setup SSH for private repos
        if: ${{ secrets.NOESIS_SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NOESIS_SSH_KEY }}
      
      - name: NOESIS - Synchronize repositories
        id: sync
        run: |
          python .github/scripts/noesis_orchestrator.py \
            --mode sync \
            ${{ inputs.force_sync == true && '--force' || '' }}
          
          if [ -f .noesis_state.json ]; then
            REPOS_SYNCED=$(jq -r '.repos_synced | length' .noesis_state.json || echo "0")
            echo "repos_synced=$REPOS_SYNCED" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔍 Diagnostics - Integration Check
        id: diagnostics_pre
        run: |
          echo "🔍 Running integration diagnostics..."
          python .github/scripts/fix_integration.py || true
          python .github/scripts/verify_sabio.py || true
          
      - name: 🔧 Fix Permissions
        if: ${{ github.event.inputs.force_fix == 'true' }}
        run: |
          echo "🔧 Fixing file permissions..."
          chmod +x .github/scripts/*.py || true
          chmod +x *.py || true
      
      - name: AMDA - Analyze sorries
        id: amda
        run: |
          python .github/scripts/v2/amda_deep_v2.py amda_report_v2.json amda_report_v2.md
          
          if [ -f amda_report_v2.json ]; then
            TOTAL_SORRIES=$(jq -r '.total_sorries' amda_report_v2.json || echo "0")
            echo "total_sorries=$TOTAL_SORRIES" >> $GITHUB_OUTPUT
          fi
      
      - name: ⚡ AURON - Execute transformations with diagnostics
        id: auron
        run: |
          echo "⚡ AURON NEURAL V2.0 - Executing with enhanced logging..."
          
          MODE="dry-run"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            MODE="execute"
          fi
          
          python .github/scripts/v2/auron_neural_v2.py \
            $MODE \
            amda_report_v2.json \
            auron_neural_results.json
          
          if [ -f auron_neural_results.json ]; then
            SUCCESS=$(jq -r '.success' auron_neural_results.json || echo "0")
            FAIL=$(jq -r '.fail' auron_neural_results.json || echo "0")
            TOTAL=$((SUCCESS + FAIL))
            if [ $TOTAL -gt 0 ]; then
              SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($SUCCESS/$TOTAL)*100}")
            else
              SUCCESS_RATE="0"
            fi
            echo "successful=$SUCCESS" >> $GITHUB_OUTPUT
            echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔬 SABIO ∞³ Integration
        id: sabio
        continue-on-error: true
        run: |
          echo "🧬 Integrando SABIO ∞³..."
          if [ -f ".github/scripts/noesis_integrator.py" ]; then
            python .github/scripts/noesis_integrator.py --mode sabio
            
            # Verificar frecuencia base
            if [ -f "Evac_Rpsi_data.csv" ]; then
              echo "✅ Frecuencia base: 141.7001 Hz validada"
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Evac_Rpsi_data.csv no encontrado"
              echo "status=partial" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️  .github/scripts/noesis_integrator.py no encontrado"
            echo "status=missing" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔍 RH Validation Integration
        id: validation
        continue-on-error: true
        run: |
          echo "🔬 Integrando validaciones RH..."
          if [ -f ".github/scripts/noesis_integrator.py" ]; then
            python .github/scripts/noesis_integrator.py --mode validation
            
            # Verificar V5 Coronación
            if [ -f "validate_v5_coronacion.py" ]; then
              python validate_v5_coronacion.py || echo "⚠️  Validación V5 falló o produjo warnings"
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "⚠️  validate_v5_coronacion.py no encontrado"
              echo "status=partial" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️  .github/scripts/noesis_integrator.py no encontrado"
            echo "status=missing" >> $GITHUB_OUTPUT
          fi
      
      - name: 🤖 Auto-Evolution Integration
        id: evolution
        continue-on-error: true
        run: |
          echo "🔄 Integrando auto-evolución QCAL..."
          if [ -f ".github/scripts/noesis_integrator.py" ]; then
            python .github/scripts/noesis_integrator.py --mode auto-evolution || echo "⚠️  Auto-evolución QCAL falló o produjo warnings"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️  .github/scripts/noesis_integrator.py no encontrado para auto-evolución"
            echo "status=partial" >> $GITHUB_OUTPUT
          fi
      
      - name: 📊 Generate Unified Report
        id: report
        continue-on-error: true
        run: |
          echo "📊 Generando reporte unificado..."
          if [ -f ".github/scripts/noesis_integrator.py" ]; then
            python .github/scripts/noesis_integrator.py --mode report --output noesis_complete.md
          else
            echo "⚠️  .github/scripts/noesis_integrator.py no encontrado para reporte"
          fi
          
          # Extract statuses
          SABIO_STATUS="${{ steps.sabio.outcome }}"
          VALIDATION_STATUS="${{ steps.validation.outcome }}"
          EVOLUTION_STATUS="${{ steps.evolution.outcome }}"
          
          echo "sabio_status=$SABIO_STATUS" >> $GITHUB_OUTPUT
          echo "validation_status=$VALIDATION_STATUS" >> $GITHUB_OUTPUT
          echo "evolution_status=$EVOLUTION_STATUS" >> $GITHUB_OUTPUT
      
      - name: 🔍 Diagnostics - Post-Analysis
        if: always()
        id: diagnostics_post
        run: |
          echo "🔍 Running NOESIS diagnostics after processing..."
          python .github/scripts/diagnose_noesis.py || true
          
          # Show integration status
          echo "📊 INTEGRATION STATUS:"
          echo "  SABIO ∞³: ${{ steps.sabio.outcome }}"
          echo "  Validation: ${{ steps.validation.outcome }}"
          echo "  Auto-Evolution: ${{ steps.evolution.outcome }}"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noesis-complete-${{ github.run_number }}
          path: |
            amda_report_v2.json
            amda_report_v2.md
            auron_neural_results.json
            noesis_complete.md
            noesis_integrated_report.md
            noesis_integration_results.json
            integration_fix_results.json
            INTEGRATION_FIX_REPORT.md
            sabio_verification_report.json
            noesis_cerebral_v2.log
            amda_deep_v2.log
            auron_neural.log
            .noesis_state.json
            .auron_learning.json
            commit_msg_*.txt
          retention-days: 30
      
      - name: 📝 Prepare PR Body
        if: steps.auron.outputs.successful > 0 && inputs.dry_run == false
        id: pr_body
        run: |
          # Check if noesis_complete.md exists, otherwise create fallback
          if [ -f "noesis_complete.md" ]; then
            echo "Using generated report: noesis_complete.md"
            echo "body_file=noesis_complete.md" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Report file not found, creating fallback body"
            cat > pr_body_fallback.md << EOF
          ## 🧠 NOESIS CEREBRAL V2.0 - Automated Integration
          
          **Cycle:** ${{ github.run_number }}
          
          ### 📊 Statistics
          - **Sorries eliminated:** ${{ steps.auron.outputs.successful }}
          - **Success rate:** ${{ steps.auron.outputs.success_rate }}%
          
          ### 🔬 Integration Status
          - **SABIO ∞³:** ${{ steps.sabio.outcome }}
          - **Validación RH:** ${{ steps.validation.outcome }}
          - **Auto-Evolución QCAL:** ${{ steps.evolution.outcome }}
          
          ### ⚠️ Note
          Unified report generation encountered an issue. See workflow artifacts for detailed logs.
          
          **Automated by NOESIS CEREBRAL V2.0**
          EOF
            echo "body_file=pr_body_fallback.md" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.auron.outputs.successful > 0 && inputs.dry_run == false
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            🧠 [NOESIS INTEGRACIÓN COMPLETA] Cycle ${{ github.run_number }}
            
            - Sorries eliminados: ${{ steps.auron.outputs.successful }}
            - Success rate: ${{ steps.auron.outputs.success_rate }}%
            - SABIO ∞³: ${{ steps.report.outputs.sabio_status }}
            - Validación RH: ${{ steps.report.outputs.validation_status }}
            - Auto-Evolución: ${{ steps.report.outputs.evolution_status }}
          branch: integration/noesis-${{ github.run_number }}
          delete-branch: true
          title: '🧠 NOESIS INTEGRACIÓN COMPLETA #${{ github.run_number }}'
          body-path: ${{ steps.pr_body.outputs.body_file }}
          labels: |
            automated
            noesis
            integration
            complete
            sorry-elimination
      
      - name: Summary
        if: always()
        run: |
          echo "## 🧠 NOESIS COMPLETE INTEGRATION V2.1 - Cycle Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cycle:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Frecuencia base:** 141.7001 Hz ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Resultados NOESIS" >> $GITHUB_STEP_SUMMARY
          echo "- Sorries analyzed: ${{ steps.amda.outputs.total_sorries }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes made: ${{ steps.auron.outputs.successful }}" >> $GITHUB_STEP_SUMMARY
          echo "- Success rate: ${{ steps.auron.outputs.success_rate }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔬 SABIO ∞³" >> $GITHUB_STEP_SUMMARY
          echo "- Estado: ${{ steps.sabio.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Validación RH" >> $GITHUB_STEP_SUMMARY
          echo "- Estado: ${{ steps.validation.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🤖 Auto-Evolución QCAL" >> $GITHUB_STEP_SUMMARY
          echo "- Estado: ${{ steps.evolution.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ♾³ Coherencia QCAL" >> $GITHUB_STEP_SUMMARY
          echo "✓ Frecuencia fundamental: 141.7001 Hz" >> $GITHUB_STEP_SUMMARY
          echo "✓ Coherencia global: ♾³" >> $GITHUB_STEP_SUMMARY
