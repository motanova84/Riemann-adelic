name: 🧠 NOESIS COMPLETE INTEGRATION V2.1

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: true
        default: 'full'
        type: choice
        options:
          - sync
          - harvest
          - analyze
          - full
      force_sync:
        description: 'Force re-sync all repositories'
        required: false
        default: false
        type: boolean
      force_fix:
        description: 'Force integration fix'
        required: false
        default: false
        type: boolean
      max_changes:
        description: 'Maximum changes per cycle'
        required: false
        default: '20'
        type: string
      dry_run:
        description: 'Dry run mode (no actual changes)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cerebral-seal:
    name: NOESIS CEREBRAL V2.0
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy scipy sympy mpmath
          pip install pytest  # Para pruebas
      
      - name: Setup SSH for private repos
        if: ${{ secrets.NOESIS_SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NOESIS_SSH_KEY }}
      
      - name: NOESIS - Synchronize repositories
        id: sync
        run: |
          python .github/scripts/noesis_orchestrator.py \
            --mode sync \
            ${{ inputs.force_sync == true && '--force' || '' }}
          
          if [ -f .noesis_state.json ]; then
            REPOS_SYNCED=$(jq -r '.repos_synced | length' .noesis_state.json || echo "0")
            echo "repos_synced=$REPOS_SYNCED" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔍 Diagnosticar integración
        id: diagnose
        run: |
          echo "🔍 Diagnosticando integración NOESIS..."
          python .github/scripts/fix_integration.py
          python .github/scripts/verify_sabio.py
          
          # Capturar estado para siguiente paso
          if [ -f INTEGRATION_FIX_REPORT.md ]; then
            echo "needs_fix=true" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔧 Reparar integración (si es necesario)
        if: ${{ github.event.inputs.force_fix == 'true' || steps.diagnose.outputs.needs_fix == 'true' }}
        run: |
          echo "🔧 Aplicando reparaciones..."
          chmod +x .github/scripts/*.py
          chmod +x *.py
          echo "✅ Permisos de ejecución corregidos"
      
      - name: 🔍 Diagnostics - Pre-Analysis
        id: diagnostics_pre
        run: |
          echo "🔍 Running NOESIS diagnostics before processing..."
          python .github/scripts/diagnose_noesis.py || true
      
      - name: 🧠 NOESIS Core - ML Learning
        run: |
          python .github/scripts/noesis_orchestrator.py --mode sync || true
          python .github/scripts/v2/amda_deep_v2.py --analyze --output amda_ml.json || true
          python .github/scripts/v2/auron_neural_v2.py --learn --input amda_ml.json || true
      
      - name: 🔬 SABIO ∞³ Integration
        id: sabio
        run: |
          echo "🔬 Integrando SABIO ∞³..."
          python .github/scripts/noesis_integrator.py --mode sabio || echo "sabio_status=partial"
          python utils/validate_frequency.py --expected 141.7001 || echo "freq_status=skip"
        continue-on-error: true
      
      - name: 🔍 RH Validation Integration
        id: validation
        run: |
          echo "🔍 Integrando validación RH..."
          python .github/scripts/noesis_integrator.py --mode validation || echo "validation_status=partial"
          python validate_v5_coronacion.py --quick || echo "v5_status=skip"
        continue-on-error: true
      
      - name: 🤖 Auto-Evolution Integration
        id: evolution
        run: |
          echo "🤖 Integrando auto-evolución..."
          python .github/scripts/noesis_integrator.py --mode auto-evolution || echo "evolution_status=partial"
          python utils/noesis_sync.py --auto || echo "sync_status=skip"
        continue-on-error: true
      
      - name: 📊 Generate Unified Report
        run: |
          python .github/scripts/noesis_integrator.py --report \
            --sabio-status ${{ steps.sabio.outcome }} \
            --validation-status ${{ steps.validation.outcome }} \
            --evolution-status ${{ steps.evolution.outcome }} \
            --output noesis_complete.md || echo "Report generation skipped"
      
      - name: AMDA - Analyze sorries
        id: amda
        run: |
          python .github/scripts/v2/amda_deep_v2.py amda_report_v2.json amda_report_v2.md
          
          if [ -f amda_report_v2.json ]; then
            TOTAL_SORRIES=$(jq -r '.total_sorries' amda_report_v2.json || echo "0")
            echo "total_sorries=$TOTAL_SORRIES" >> $GITHUB_OUTPUT
          fi
      
      - name: ⚡ AURON - Execute transformations with diagnostics
        id: auron
        run: |
          echo "⚡ AURON NEURAL V2.0 - Executing with enhanced logging..."
          
          MODE="dry-run"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            MODE="execute"
          fi
          
          python .github/scripts/v2/auron_neural_v2.py \
            $MODE \
            amda_report_v2.json \
            auron_neural_results.json
          
          if [ -f auron_neural_results.json ]; then
            SUCCESS=$(jq -r '.success' auron_neural_results.json || echo "0")
            FAIL=$(jq -r '.fail' auron_neural_results.json || echo "0")
            TOTAL=$((SUCCESS + FAIL))
            if [ $TOTAL -gt 0 ]; then
              SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($SUCCESS/$TOTAL)*100}")
            else
              SUCCESS_RATE="0"
            fi
            echo "successful=$SUCCESS" >> $GITHUB_OUTPUT
            echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔍 Diagnostics - Post-Analysis
        if: always()
        id: diagnostics_post
        run: |
          echo "🔍 Running NOESIS diagnostics after processing..."
          python .github/scripts/diagnose_noesis.py || true
      
      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noesis-complete-${{ github.run_id }}
          path: |
            noesis_complete.md
            .auron_learning.json
            amda_ml.json
            INTEGRATION_FIX_REPORT.md
            amda_report_v2.json
            amda_report_v2.md
            auron_neural_results.json
            noesis_cerebral_v2.log
            amda_deep_v2.log
            auron_neural.log
            .noesis_state.json
            commit_msg_*.txt
            *.log
          retention-days: 30
      
      - name: 🔀 Create Integration PR
        if: steps.auron.outputs.successful > 0 && inputs.dry_run == false
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🧠 [INTEGRATION] NOESIS Complete Integration $(date +%Y-%m-%d)"
          title: "🧠 NOESIS INTEGRACIÓN COMPLETA #6"
          body-path: noesis_complete.md
          branch: integration/noesis-${{ github.run_id }}
          base: main
          labels: |
            automated
            noesis
            integration
            complete
      
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🧠 NOESIS COMPLETE INTEGRATION V2.1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Resultados de Integración" >> $GITHUB_STEP_SUMMARY
          echo "- **SABIO ∞³:** ${{ steps.sabio.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RH Validation:** ${{ steps.validation.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto-Evolution:** ${{ steps.evolution.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Sorries analizados:** ${{ steps.amda.outputs.total_sorries }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cambios exitosos:** ${{ steps.auron.outputs.successful }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tasa de éxito:** ${{ steps.auron.outputs.success_rate }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌌 Coherencia QCAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Frecuencia base:** 141.7001 Hz ✓" >> $GITHUB_STEP_SUMMARY
          echo "- **Coherencia global:** ♾³ ✓" >> $GITHUB_STEP_SUMMARY
