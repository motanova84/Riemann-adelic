    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify QCAL Nucleus
        run: |
          echo "✅ sat-certificates — QCAL NUCLEUS verificado"
          echo "   Pipeline: ζ→ξ→λ∈σ(T)→Im(λ)=0→Re(s)=1/2"
          echo "   Coherence: Ψ = 1.000000"
          echo "   Frequency: f₀ = 141.7001 Hz"
          echo "   Seal: ∴𓂀Ω∞³Φ · TUYOYOTU · HECHO ESTÁ"
          ls -la formalization/lean/QCAL_NUCLEUS.lean formalization/lean/riemann_hypothesis_final.lean 2>/dev/null && echo "✅ Núcleo formal presente" || echo "⚠️ Archivos no encontrados"
